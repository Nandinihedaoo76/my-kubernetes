apiVersion : apps/v1
kind: ReplicaSet
metadata:
  name: my-rs
  labels:
    app: cbz-app    
spec:
  replicas: 3 
  selector:
    matchLabels:
        app: cbz-app
    matchExpressions:
        - {key: app, operator: In, values: [cbz-app, rs-app]}  
  template:
    metadata: 
      labels:
        app: cbz-app
    spec:
      containers:
        - name: my-c
          image: httpd
          ports:
            - containerPort: 80
  
---

apiVersion: v1
kind: Service
metadata:
  name: demo-svc
  labels:
    app: cbz-app
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: NodePort
  selector:
    app: rs-app

