apiVersion: apps/v1
kind: Deployment  
metadata:
  name: my-deploy
  labels:
    app: deploy-app
spec:
  replicas: 3 
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:  
      app: deploy-app
    matchExpressions:
      - {key: app, operator: In, values: [cbz-app, deploy-app]}
  template:
    metadata: 
      labels:
        app: deploy-app
    spec:
      containers:
        - name: my-c
          image: httpd
          ports:
            - containerPort: 80